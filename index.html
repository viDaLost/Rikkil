<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Библейские игры — Премиум</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

  <header>
    <h1>Библейские игры</h1>
    <div id="user-profile" class="fade-in">
      <!-- Профиль будет отрендерен через JS -->
    </div>
  </header>

  <div id="main-loader" style="position:fixed; inset:0; background:var(--bg-color); z-index:99999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <div style="width: 48px; height: 48px; border: 4px solid var(--accent-color); border-top-color: var(--accent-active); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="margin-top: 1.5rem; font-weight: 700; color: var(--accent-active);">Загрузка мира игр...</p>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
  </div>

  <div class="menu-container hidden" id="menu-container">
    <section>
      <div class="menu-section-title">Игры для компании</div>
      <div class="menu-grid">
        <button onclick="showGame('alias')" class="game-button">
          <span style="font-size: 1.5rem;">🗣️</span> Алиас
        </button>
        <button onclick="showGame('coimaginarium')" class="game-button">
          <span style="font-size: 1.5rem;">🧠</span> Соображариум
        </button>
        <button onclick="showGame('guess')" class="game-button">
          <span style="font-size: 1.5rem;">👥</span> Угадай персонажа
        </button>
        <button onclick="showGame('spy')" class="game-button">
          <span style="font-size: 1.5rem;">🕵️‍♂️</span> Шпион
        </button>
        <button onclick="showGame('quartet')" class="game-button">
          <span style="font-size: 1.5rem;">🃏</span> Квартет
        </button>
      </div>
    </section>

    <section>
      <div class="menu-section-title">Словесные головоломки</div>
      <div class="menu-grid">
        <button onclick="showGame('bible-wow')" class="game-button">
          <span style="font-size: 1.5rem;">🧩</span> Библейские слова
        </button>
        <button onclick="showGame('bible-wordsearch')" class="game-button">
          <span style="font-size: 1.5rem;">🔎</span> Поиск слов
        </button>
        <button onclick="showGame('sacred-word')" class="game-button">
          <span style="font-size: 1.5rem;">🪔</span> Священное слово
        </button>
      </div>
    </section>

    <section>
      <div class="menu-section-title">Детский уголок</div>
      <div class="menu-grid">
        <button onclick="showGame('kids-ark-pairs')" class="game-button">
          <span style="font-size: 1.5rem;">🛳️</span> Найди пару
        </button>
      </div>
    </section>
  </div>

  <div id="game-container"></div>

  <script src="app.js" defer></script>
</body>
</html>
