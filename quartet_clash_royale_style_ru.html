<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Квартет — стиль Clash Royale</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@700;800;900&family=Be+Vietnam+Pro:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#04111f;--field:#0d2135;--panel:#10283f;--panel2:#163652;--text:#e8f2ff;--muted:#adc3db;--gold:#ffcb4f;--blue:#62b0ff;--red:#ff7b70;--line:rgba(255,255,255,.09);--ok:#7fe2a0;}
*{box-sizing:border-box} html,body{margin:0;min-height:100%;font-family:"Be Vietnam Pro",system-ui,sans-serif;background:linear-gradient(180deg,#07203a,#04111f);color:var(--text)} body{padding:0 0 100px}
.topbar{position:sticky;top:0;z-index:10;background:linear-gradient(180deg,#21364d,#142436);border-bottom:4px solid #09101a;box-shadow:0 8px 0 rgba(0,0,0,.28)} .topbar .wrap{width:min(1120px,calc(100% - 20px));margin:0 auto;display:flex;justify-content:space-between;align-items:center;padding:14px 0}
.brand{display:flex;align-items:center;gap:10px;font-family:Epilogue,sans-serif;font-weight:900;text-transform:uppercase;letter-spacing:.04em} .crown{width:42px;height:42px;border-radius:14px;background:linear-gradient(180deg,#ffdb70,#d79209);box-shadow:inset 0 -4px 0 rgba(92,54,0,.35),0 8px 18px rgba(255,203,79,.22)} .brand-name{font-size:26px;color:var(--gold);text-shadow:0 4px 0 #6d4a00}
.wrap{width:min(1120px,calc(100% - 20px));margin:18px auto 0}
.panel{background:linear-gradient(180deg,var(--panel2),var(--panel));border:2px solid #3a4d63;border-radius:24px;box-shadow:0 10px 0 rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.06)}
.hero{padding:26px;overflow:hidden;position:relative} .hero::after{content:'';position:absolute;right:-40px;top:-20px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle, rgba(255,203,79,.16), transparent 70%)}
.kicker{color:#ffd980;font-size:13px;letter-spacing:.12em;text-transform:uppercase;font-weight:900;margin-bottom:8px;font-family:Epilogue,sans-serif} h1,h2{font-family:Epilogue,sans-serif;margin:0} h1{font-size:clamp(40px,7vw,78px);line-height:.95} h2{font-size:clamp(24px,3.4vw,36px)} p{color:var(--muted);max-width:760px}
.btn{border:none;border-radius:18px;padding:14px 18px;font-weight:900;font-family:Epilogue,sans-serif;letter-spacing:.02em;cursor:pointer;transition:.16s transform} .btn:hover{transform:translateY(-1px)} .btn:active{transform:translateY(3px)}
.primary{background:linear-gradient(180deg,#ffdb72,#e9a90a);color:#493100;box-shadow:0 6px 0 #9f6a00} .secondary{background:linear-gradient(180deg,#7bc1ff,#3d8fea);color:#08294a;box-shadow:0 6px 0 #1f5ea1} .ghost{background:linear-gradient(180deg,#28445f,#1a2f47);color:#edf3fb;box-shadow:0 6px 0 #0d1b29}
.menu-actions,.stats-grid,.players-list,.lobby-footer,.settings-grid,.game-columns,.pills,.scoreboard{display:flex;gap:14px;flex-wrap:wrap}
.stats-grid{margin-top:18px} .stat{flex:1;min-width:180px;padding:18px;border-radius:20px;background:linear-gradient(180deg,#17324d,#10243a);border:2px solid #40556c;box-shadow:0 8px 0 rgba(0,0,0,.18)} .stat span{display:block;color:var(--muted);font-size:13px;margin-bottom:8px} .stat strong{font-family:Epilogue,sans-serif;font-size:22px}
.bottom-nav{position:fixed;left:10px;right:10px;bottom:10px;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:10px;border-radius:24px;background:linear-gradient(180deg,#1d344c,#132436);border:2px solid #41556c;box-shadow:0 10px 0 rgba(0,0,0,.26)} .tab{border:none;border-radius:18px;background:transparent;padding:12px 8px;color:#c7d7ea;font-weight:800;cursor:pointer} .tab.active{background:linear-gradient(180deg,#355878,#213852);box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
.section-head{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:14px} .panel-pad{padding:20px} .muted{color:var(--muted)} .small{font-size:14px}
.player-row,.rule,.toggle,.group-box,.log-item,.completed-box{background:linear-gradient(180deg,#17314a,#12273d);border:2px solid #41556c;border-radius:18px;box-shadow:0 8px 0 rgba(0,0,0,.15)} .player-row{padding:14px 16px;display:flex;justify-content:space-between;align-items:center} .player-row span{display:block;font-size:13px;color:var(--muted);margin-top:4px} .row-actions{display:flex;gap:10px;align-items:center}
.badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:8px 12px;font-weight:900;font-family:Epilogue,sans-serif;font-size:12px} .ok{background:rgba(127,226,160,.12);color:#a1f0bb;border:1px solid rgba(127,226,160,.28)} .wait{background:rgba(255,203,79,.12);color:#ffdc85;border:1px solid rgba(255,203,79,.24)} .mini{border:none;padding:10px 12px;border-radius:12px;background:#253b52;color:#fff;box-shadow:0 4px 0 #16273b;cursor:pointer}
.rules-list{display:grid;gap:12px} .rule{padding:16px} .rule b{display:block;font-family:Epilogue,sans-serif;margin-bottom:8px} .settings-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px} .toggle{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.switch{width:62px;height:36px;border:none;border-radius:999px;background:#425669;position:relative;cursor:pointer} .switch::after{content:'';position:absolute;top:4px;left:4px;width:28px;height:28px;border-radius:50%;background:#fff;transition:.2s} .switch.on{background:linear-gradient(180deg,#ffd86a,#e0a30c)} .switch.on::after{left:30px}
.game-top{padding:18px 20px;display:flex;justify-content:space-between;align-items:center;gap:14px} .score-pill{padding:10px 14px;border-radius:999px;background:linear-gradient(180deg,#1b344c,#10243a);border:2px solid #41556c;font-family:Epilogue,sans-serif;display:flex;gap:10px;align-items:center} .score-pill.turn{box-shadow:inset 0 0 0 2px rgba(255,203,79,.45)}
.game-columns{display:grid;grid-template-columns:1.4fr .9fr;gap:16px} .group-box{padding:14px;margin-top:12px} .group-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px} .group-head>div{display:flex;align-items:center;gap:10px} .cards-row{display:flex;gap:10px;flex-wrap:wrap} .card{min-width:140px;padding:14px;border:none;border-radius:18px;text-align:left;cursor:pointer;color:#fff;background:linear-gradient(180deg,#26507a,#19324f);box-shadow:0 6px 0 #10243a;outline:2px solid rgba(255,255,255,.06)} .card.selected{outline:2px solid var(--gold)} .num{display:block;font-family:Epilogue,sans-serif;color:#ffd76d;font-size:12px;margin-bottom:6px} .name{font-weight:800}
.pill{border:none;border-radius:999px;padding:12px 14px;background:linear-gradient(180deg,#254058,#17314a);color:#fff;box-shadow:0 4px 0 #10243a;cursor:pointer} .pill.active{outline:2px solid rgba(255,203,79,.5)} .label{font-size:13px;color:#ffd980;font-family:Epilogue,sans-serif;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px} .completed-box{padding:14px;margin-top:14px;color:var(--muted)} .log-list{display:grid;gap:10px} .log-item{padding:14px 16px}
@media (max-width:900px){.settings-grid{grid-template-columns:1fr} .game-columns{grid-template-columns:1fr} }
</style>
</head>
<body>
<header class="topbar"><div class="wrap"><div class="brand"><div class="crown"></div><div class="brand-name">Quartet</div></div><button class="btn ghost" onclick="setScreen('settings')">Конфиг</button></div></header>
<div id="app" class="wrap"></div>
<nav class="bottom-nav">
  <button class="tab active" data-tab="menu" onclick="setScreen('menu')">Главная</button>
  <button class="tab" data-tab="lobby" onclick="setScreen('lobby')">Бой</button>
  <button class="tab" data-tab="game" onclick="if(!state.hands['Вы'].length) initGame(); setScreen('game')">Колода</button>
  <button class="tab" data-tab="rules" onclick="setScreen('rules')">Правила</button>
  <button class="tab" data-tab="settings" onclick="setScreen('settings')">Настройки</button>
</nav>
<script>
const DATA = {
  categories: [
    { id:'apostles', name:'Апостолы', icon:'✝️', cards:['Пётр','Андрей','Иаков','Иоанн'] },
    { id:'evangelists', name:'Евангелисты', icon:'📜', cards:['Матфей','Марк','Лука','Иоанн Богослов'] },
    { id:'patriarchs', name:'Патриархи', icon:'🏺', cards:['Авраам','Исаак','Иаков','Иосиф'] },
    { id:'prophets', name:'Пророки', icon:'🔥', cards:['Илия','Елисей','Исаия','Иеремия'] }
  ],
  players: ['Сара','Алекс','Марк']
};
function makeDeck(){ const deck=[]; DATA.categories.forEach(cat=>cat.cards.forEach((name, idx)=>deck.push({id:`${cat.id}_${idx+1}`, cat:cat.id, catName:cat.name, icon:cat.icon, number:idx+1, name}))); return deck; }
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
const state = { screen:'menu', roomCode:'QT-' + Math.random().toString(36).slice(2,6).toUpperCase(), sound:true, music:true, haptics:true, effects:true, host:'Вы', currentTurn:'Вы', log:['Добро пожаловать в «Квартет». Создайте комнату или начните тренировочную партию.'], selectedPlayer:'Сара', selectedCardId:null, hands:{ 'Вы':[], 'Сара':[], 'Алекс':[], 'Марк':[] }, completed:{ 'Вы':[], 'Сара':[], 'Алекс':[], 'Марк':[] }, lobbyReady:{ 'Вы':true, 'Сара':true, 'Алекс':true, 'Марк':false } };
function initGame(){ const deck = shuffle(makeDeck()); Object.keys(state.hands).forEach(p=>state.hands[p]=[]); Object.keys(state.completed).forEach(p=>state.completed[p]=[]); for(let i=0;i<5;i++){ Object.keys(state.hands).forEach(p=>{ const c=deck.pop(); if(c) state.hands[p].push(c); }); } state.currentTurn='Вы'; state.selectedPlayer='Сара'; state.selectedCardId = state.hands['Вы'][0]?.id || null; state.log = ['Партия началась. Ваш ход.']; checkQuartetsAll(); render(); }
function byCat(hand){ const map = {}; hand.forEach(c=>{ if(!map[c.cat]) map[c.cat]={catName:c.catName, icon:c.icon, cards:[]}; map[c.cat].cards.push(c); }); Object.values(map).forEach(g=>g.cards.sort((a,b)=>a.number-b.number)); return map; }
function checkQuartets(player){ const groups = byCat(state.hands[player]); Object.entries(groups).forEach(([cat,g])=>{ if(g.cards.length===4 && !state.completed[player].includes(cat)){ state.completed[player].push(cat); state.log.unshift(`${player} собрал(а) квартет «${g.catName}».`); } }); }
function checkQuartetsAll(){ Object.keys(state.hands).forEach(p=>checkQuartets(p)); }
function setScreen(screen){ state.screen=screen; render(); }
function copyCode(){ navigator.clipboard?.writeText(state.roomCode); pushLog('Код комнаты скопирован: ' + state.roomCode); }
function toggleReadyBot(name){ if(name==='Вы') return; state.lobbyReady[name]=!state.lobbyReady[name]; render(); }
function startFromLobby(){ initGame(); setScreen('game'); }
function toggleSetting(key){ state[key]=!state[key]; render(); }
function pushLog(msg){ state.log.unshift(msg); if(state.log.length>8) state.log.length=8; render(); }
function chooseCard(id){ state.selectedCardId=id; render(); }
function choosePlayer(name){ state.selectedPlayer=name; render(); }
function requestCard(){ if(state.currentTurn!=='Вы') return pushLog('Сейчас ход соперника.'); const my = state.hands['Вы']; const card = my.find(c=>c.id===state.selectedCardId); if(!card) return pushLog('Сначала выберите карту из своей руки.'); const target = state.selectedPlayer; const needed = DATA.categories.find(c=>c.id===card.cat).cards.map((name, idx)=>({id:`${card.cat}_${idx+1}`, name, number:idx+1})).find(x=>!my.some(c=>c.id===x.id)); if(!needed) return pushLog('По этой серии у вас уже собран полный квартет.'); const targetHand = state.hands[target]; const found = targetHand.find(c=>c.id===needed.id); if(found){ state.hands[target] = targetHand.filter(c=>c.id!==needed.id); state.hands['Вы'].push(found); state.log.unshift(`Вы запросили у ${target.toLowerCase()} карту «${found.name}» и получили её.`); checkQuartets('Вы'); state.selectedCardId = found.id; render(); } else { state.log.unshift(`У ${target.toLowerCase()} не оказалось карты «${needed.name}». Ход переходит соперникам.`); state.currentTurn = target; render(); setTimeout(botTurn, 900); } }
function botTurn(){ const bots = DATA.players; let actor = state.currentTurn; if(actor==='Вы') return; const hand = state.hands[actor]; if(!hand.length){ state.currentTurn='Вы'; pushLog(`${actor} пропускает ход.`); return; } const sample = hand[Math.floor(Math.random()*hand.length)]; const targets = ['Вы', ...bots.filter(p=>p!==actor)]; const target = targets[Math.floor(Math.random()*targets.length)]; const needList = DATA.categories.find(c=>c.id===sample.cat).cards.map((name, idx)=>({id:`${sample.cat}_${idx+1}`, name})).filter(x=>!hand.some(c=>c.id===x.id)); const needed = needList[Math.floor(Math.random()*needList.length)] || {id:sample.id, name:sample.name}; const tHand = state.hands[target]; const found = tHand.find(c=>c.id===needed.id); if(found){ state.hands[target] = tHand.filter(c=>c.id!==needed.id); state.hands[actor].push(found); state.log.unshift(`${actor} получил(а) у ${target==='Вы'?'вас':target.toLowerCase()} карту «${found.name}».`); checkQuartets(actor); render(); setTimeout(botTurn, 900); } else { state.log.unshift(`${actor} запросил(а) «${needed.name}», но промахнулся(лась). Ваш ход.`); state.currentTurn='Вы'; render(); } }
function renderMenu(){ return `<section class="screen active hero"><div class="hero-card panel"><div class="kicker">Русская версия • автономный HTML</div><h1>Квартет</h1><p>Собирайте наборы из четырёх карт, запрашивайте недостающие карты у соперников и побеждайте по числу собранных квартетов.</p><div class="menu-actions"><button class="btn primary" onclick="setScreen('lobby')">Создать комнату</button><button class="btn secondary" onclick="initGame(); setScreen('game')">Быстрый матч</button><button class="btn ghost" onclick="setScreen('rules')">Правила</button></div><div class="stats-grid"><div class="stat"><span>Игроков онлайн</span><strong>2 481</strong></div><div class="stat"><span>Ваш ранг</span><strong>42 ур.</strong></div><div class="stat"><span>Средний матч</span><strong>9:41</strong></div></div></div></section>`; }
function renderLobby(){ const players = Object.entries(state.lobbyReady).map(([name,ready])=>`<div class="player-row ${ready?'ready':''}"><div><strong>${name}</strong><span>${name==='Вы'?'ХОСТ':'Игрок'}</span></div><div class="row-actions"><span class="badge ${ready?'ok':'wait'}">${ready?'Готов':'Ожидает'}</span>${name!=='Вы'?`<button class="mini" onclick="toggleReadyBot('${name}')">Перекл.</button>`:''}</div></div>`).join(''); const readyCount = Object.values(state.lobbyReady).filter(Boolean).length; return `<section class="screen active"><div class="panel lobby-box"><div class="section-head"><div><div class="kicker">Лобби</div><h2>Комната готова</h2></div><button class="btn ghost" onclick="copyCode()">Код: ${state.roomCode}</button></div><p class="muted">Ожидание игроков. Для демонстрации можно переключать готовность ботов вручную.</p><div class="players-list">${players}</div><div class="lobby-footer"><div class="stat-inline">${readyCount} / 4 игроков готовы</div><button class="btn primary" onclick="startFromLobby()">Начать игру</button></div></div></section>`; }
function renderRules(){ return `<section class="screen active"><div class="panel rules-box"><div class="section-head"><div><div class="kicker">Правила</div><h2>Как играть</h2></div><button class="btn ghost" onclick="setScreen('settings')">Настройки</button></div><div class="rules-list"><div class="rule"><b>1. Цель</b><span>Соберите как можно больше квартетов — полных наборов из четырёх связанных карт.</span></div><div class="rule"><b>2. Ход</b><span>Выберите карту из руки, затем соперника. Игра сама запросит недостающую карту из этой серии.</span></div><div class="rule"><b>3. Успех</b><span>Если карта есть у соперника, вы забираете её и продолжаете ход.</span></div><div class="rule"><b>4. Промах</b><span>Если карты нет, ход переходит соперникам.</span></div></div><div class="settings-grid compact"><label class="toggle"><span>Звук</span><button class="switch ${state.sound?'on':''}" onclick="toggleSetting('sound')"></button></label><label class="toggle"><span>Музыка</span><button class="switch ${state.music?'on':''}" onclick="toggleSetting('music')"></button></label><label class="toggle"><span>Вибрация</span><button class="switch ${state.haptics?'on':''}" onclick="toggleSetting('haptics')"></button></label><label class="toggle"><span>Эффекты</span><button class="switch ${state.effects?'on':''}" onclick="toggleSetting('effects')"></button></label></div></div></section>`; }
function renderSettings(){ return `<section class="screen active"><div class="panel rules-box"><div class="section-head"><div><div class="kicker">Настройки</div><h2>Параметры игры</h2></div><button class="btn ghost" onclick="setScreen('rules')">К правилам</button></div><div class="settings-grid"><label class="toggle"><span>Звуковые эффекты</span><button class="switch ${state.sound?'on':''}" onclick="toggleSetting('sound')"></button></label><label class="toggle"><span>Музыка</span><button class="switch ${state.music?'on':''}" onclick="toggleSetting('music')"></button></label><label class="toggle"><span>Виброотклик</span><button class="switch ${state.haptics?'on':''}" onclick="toggleSetting('haptics')"></button></label><label class="toggle"><span>Кинетические эффекты</span><button class="switch ${state.effects?'on':''}" onclick="toggleSetting('effects')"></button></label></div><div class="version">Версия 1.0 • Русская локальная сборка</div></div></section>`; }
function renderGame(){ const myGroups = Object.values(byCat(state.hands['Вы'])); const completed = state.completed['Вы'].map(cat=>DATA.categories.find(c=>c.id===cat)?.name).filter(Boolean); const handHtml = myGroups.map(group=>{ const missing = [1,2,3,4].filter(n=>!group.cards.some(c=>c.number===n)); return `<div class="group-box"><div class="group-head"><div><span class="icon">${group.icon}</span><strong>${group.catName}</strong></div><span>${group.cards.length} / 4</span></div><div class="cards-row">${group.cards.map(c=>`<button class="card ${state.selectedCardId===c.id?'selected':''}" onclick="chooseCard('${c.id}')"><span class="num">${String(c.number).padStart(2,'0')}</span><span class="name">${c.name}</span></button>`).join('')}</div><div class="missing">${missing.length?`Не хватает: ${missing.map(n=>String(n).padStart(2,'0')).join(', ')}`:'Квартет собран'}</div></div>`; }).join('') || '<div class="empty">У вас пока нет карт.</div>'; const opponents = DATA.players.map(p=>`<button class="pill ${state.selectedPlayer===p?'active':''}" onclick="choosePlayer('${p}')">${p} <small>${state.hands[p].length}</small></button>`).join(''); return `<section class="screen active game-layout"><div class="panel game-top"><div><div class="kicker">Текущий ход</div><h2>${state.currentTurn}</h2></div><div class="scoreboard">${['Вы',...DATA.players].map(p=>`<div class="score-pill ${state.currentTurn===p?'turn':''}"><span>${p}</span><strong>${state.completed[p].length}</strong></div>`).join('')}</div></div><div class="game-columns"><div class="panel hand-panel"><div class="section-head"><div><div class="kicker">Ваша рука</div><h2>${state.hands['Вы'].length} карт</h2></div><span class="badge ok">Квартеты: ${completed.length}</span></div>${handHtml}</div><div class="panel action-panel"><div class="section-head"><div><div class="kicker">Панель действия</div><h2>Запрос карты</h2></div></div><div class="label">1. Выберите игрока</div><div class="pills">${opponents}</div><div class="label">2. Выберите карту из своей руки</div><div class="muted small">Игра автоматически запросит недостающую карту из той же серии.</div><button class="btn primary big" onclick="requestCard()">Запросить карту</button><button class="btn ghost" onclick="setScreen('lobby')">Вернуться в лобби</button><div class="completed-box">${completed.length?`Собрано: ${completed.join(', ')}`:'Пока нет собранных квартетов.'}</div></div></div><div class="panel log-panel"><div class="section-head"><div><div class="kicker">Журнал партии</div><h2>Последние события</h2></div></div><div class="log-list">${state.log.map(item=>`<div class="log-item">${item}</div>`).join('')}</div></div></section>`; }
function render(){ document.getElementById('app').innerHTML = (state.screen==='menu'?renderMenu():'') + (state.screen==='lobby'?renderLobby():'') + (state.screen==='game'?renderGame():'') + (state.screen==='rules'?renderRules():'') + (state.screen==='settings'?renderSettings():''); document.querySelectorAll('[data-tab]').forEach(el=>el.classList.toggle('active', el.dataset.tab===state.screen)); }
window.addEventListener('load', ()=>{ render(); });

renderMenu = function(){ return `<section class="panel hero"><div class="kicker">Стиль Clash Royale • русская локализация</div><h1>Квартет</h1><p>Карточная арена с визуальным стилем королевской битвы: золото, камень, массивные кнопки и быстрый запуск тренировки.</p><div class="menu-actions" style="margin-top:18px"><button class="btn primary" onclick="setScreen('lobby')">Создать комнату</button><button class="btn secondary" onclick="initGame(); setScreen('game')">Начать бой</button><button class="btn ghost" onclick="setScreen('rules')">Читать правила</button></div><div class="stats-grid"><div class="stat"><span>Игроков онлайн</span><strong>12 842</strong></div><div class="stat"><span>Мировой ранг</span><strong>#1 402</strong></div><div class="stat"><span>Средний матч</span><strong>4:20</strong></div></div></section>`; };
const _lobby = renderLobby, _rules = renderRules, _settings = renderSettings;
renderLobby = function(){ return `<section class="panel panel-pad">${_lobby().replace(/^<section class="screen active"><div class="panel lobby-box">/,'').replace(/<\/div><\/section>$/,'')}</section>`; };
